<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin WiFi - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f1f5f9; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-active { background-color: #2563eb; color: white; }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="hidden md:flex flex-col w-72 border-r border-slate-800 p-8 space-y-8 bg-slate-950 z-50 fixed inset-y-0 left-0 md:relative">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center"><i data-lucide="bot" class="text-white w-6 h-6"></i></div>
            <h1 class="text-xl font-black tracking-tighter uppercase">WiFi <span class="text-blue-500">Admin</span></h1>
        </div>
        <nav class="flex-1 space-y-2">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="sidebar-active w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl font-bold transition-all"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</button>
            <button onclick="switchTab('email-config')" id="nav-email-config" class="text-slate-400 w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl font-bold transition-all hover:bg-slate-900"><i data-lucide="mail-search" class="w-5 h-5"></i> Bot Scan Email</button>
            <button onclick="switchTab('settings')" id="nav-settings" class="text-slate-400 w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl font-bold transition-all hover:bg-slate-900"><i data-lucide="settings" class="w-5 h-5"></i> Wilayah & QRIS</button>
        </nav>
    </aside>

    <!-- KONTEN UTAMA -->
    <main class="flex-1 h-screen overflow-y-auto p-6 md:p-12">
        <header class="flex justify-between items-center mb-10">
            <h2 id="view-title" class="text-3xl font-black text-white">Dashboard</h2>
            <button onclick="document.getElementById('sidebar').classList.toggle('hidden')" class="md:hidden p-3 bg-slate-900 rounded-xl"><i data-lucide="menu"></i></button>
        </header>

        <!-- VIEW: DASHBOARD (TRANSAKSI) -->
        <section id="view-dashboard" class="space-y-6">
            <div id="transaction-list" class="grid grid-cols-1 xl:grid-cols-2 gap-5">
                <div class="col-span-full py-20 text-center text-slate-600 font-bold uppercase text-xs">Memuat Data...</div>
            </div>
        </section>

        <!-- VIEW: EMAIL CONFIG (PENGATURAN BOT) -->
        <section id="view-email-config" class="hidden space-y-8">
            <div class="bg-blue-600 rounded-[2.5rem] p-8 shadow-2xl">
                <h3 class="text-2xl font-black text-white mb-2">Bot Email Scanner</h3>
                <p class="text-blue-100 text-sm mb-8">Konfigurasi ini akan dibaca oleh Robot Google Apps Script Anda untuk verifikasi otomatis.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-[10px] font-black text-blue-200 uppercase ml-1">Email Penerima GoBiz</label>
                        <input type="email" id="monitor-email" class="w-full mt-2 p-4 bg-slate-900/50 border border-white/10 rounded-2xl text-white font-bold outline-none" placeholder="email_anda@gmail.com">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-blue-200 uppercase ml-1">Subjek Email GoBiz</label>
                        <input type="text" id="email-subject" class="w-full mt-2 p-4 bg-slate-900/50 border border-white/10 rounded-2xl text-white font-bold outline-none" placeholder="Terima Dana / Pembayaran">
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full mt-8 bg-white text-blue-700 py-4 rounded-2xl font-black hover:bg-slate-100 transition-all">Simpan Konfigurasi Bot</button>
            </div>
        </section>

        <!-- VIEW: SETTINGS (QRIS & WILAYAH) -->
        <section id="view-settings" class="hidden space-y-8 pb-20">
            <div class="glass p-8 rounded-[2rem] border-blue-500/10">
                <h3 class="text-xl font-black mb-6">Master QRIS</h3>
                <div class="flex flex-col md:flex-row gap-6 items-center">
                    <label class="w-full md:w-auto px-10 py-6 bg-blue-600 text-white rounded-[1.5rem] cursor-pointer font-black hover:bg-blue-500 transition-all">
                        <i data-lucide="upload" class="inline mb-1 mr-2"></i> Ganti QRIS 
                        <input type="file" accept="image/*" class="hidden" onchange="handleMasterQris(this)">
                    </label>
                    <textarea id="qris-string" class="flex-1 w-full bg-slate-900 border border-white/5 rounded-2xl p-4 text-xs font-mono text-blue-300 outline-none" rows="2" placeholder="Kode QRIS otomatis terisi setelah upload gambar..."></textarea>
                </div>
            </div>
            
            <div id="regions-container" class="space-y-6"></div>
            
            <button onclick="addRegion()" class="w-full py-6 border-2 border-dashed border-slate-800 rounded-[2rem] text-slate-500 font-black hover:border-slate-600 transition-all">+ Tambah Wilayah Baru</button>
            <button onclick="saveSettings()" class="w-full bg-blue-600 py-6 rounded-[2rem] font-black hover:bg-blue-500 transition-all shadow-lg shadow-blue-500/20">Simpan Pengaturan Wilayah</button>
        </section>
    </main>

    <!-- MODAL GAMBAR BUKTI -->
    <div id="modal-image" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6" onclick="this.classList.add('hidden')">
        <img id="full-image" src="" class="max-w-full max-h-[85vh] rounded-3xl" onclick="event.stopPropagation()">
        <button onclick="document.getElementById('modal-image').classList.add('hidden')" class="absolute top-4 right-4 text-white p-2"><i data-lucide="x" class="w-8 h-8"></i></button>
    </div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, updateDoc, deleteDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // ======================================================================
        // GANTI BAGIAN INI DENGAN CONFIG FIREBASE ANDA
        // ======================================================================
        let firebaseConfig = {
            apiKey: "AIzaSyAG0Hvd_63itgiOXP4GBjgQG4MhkbWXedc",
  authDomain: "wifi-pay.firebaseapp.com",
  projectId: "wifi-pay",
  storageBucket: "wifi-pay.firebasestorage.app",
  messagingSenderId: "678974524617",
  appId: "1:678974524617:web:908268390ed189362ad118"
        };
        
        // Cek jika berjalan di environment Immersive (baikan saja jika di Github)
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'wifi-pay-otomatis'; 
        // ======================================================================

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let localSettings = { regions: [], qrisString: "", monitorEmail: "", emailSubject: "Terima Dana" };
        let allTransactions = [];

        // Inisialisasi Auth (Mewajibkan login anonim)
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => { 
            if(user) { 
                loadTransactions(); 
                loadSettings(); 
            } 
        });

        // MEMUAT TRANSAKSI
        function loadTransactions() {
            onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'transactions')), (snap) => {
                // Sorting Manual di memori agar tidak butuh index Firebase
                allTransactions = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => {
                    const timeA = a.timestamp ? a.timestamp.seconds : 0;
                    const timeB = b.timestamp ? b.timestamp.seconds : 0;
                    return timeB - timeA;
                });
                
                const container = document.getElementById('transaction-list');
                container.innerHTML = allTransactions.length ? '' : '<div class="col-span-full py-20 text-center text-slate-600 font-black uppercase text-xs">Belum Ada Transaksi</div>';
                
                allTransactions.forEach(tr => {
                    const isSuccess = tr.status === 'success';
                    const card = document.createElement('div');
                    card.className = `glass p-6 rounded-[2rem] border-2 transition-all ${isSuccess ? 'border-green-500/30' : 'border-slate-800'}`;
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-black text-white">${tr.wifiName}</h4>
                                <p class="text-[10px] text-slate-500 font-bold uppercase">${tr.regionName}</p>
                            </div>
                            <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${isSuccess ? 'bg-green-500/20 text-green-500' : 'bg-yellow-500/20 text-yellow-500'}">${isSuccess ? 'Lunas (Auto)' : 'Pending'}</span>
                        </div>
                        <div class="bg-slate-950/50 rounded-2xl p-4 mb-4 text-xs space-y-2">
                            <div class="flex justify-between"><span class="text-slate-500">Pengirim</span><span class="text-white font-black">${tr.senderName}</span></div>
                            <div class="flex justify-between items-center pt-2 border-t border-white/5"><span class="text-slate-500 font-black">TOTAL</span><span class="text-lg font-black text-blue-500">Rp ${tr.amount.toLocaleString('id-ID')}</span></div>
                        </div>
                        <div class="flex gap-2">
                           <button onclick="viewImage('${tr.proofImage}')" class="flex-1 bg-slate-900 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-slate-800 transition-colors">Bukti</button>
                           ${!isSuccess ? `<button onclick="manualSuccess('${tr.id}')" class="flex-1 bg-blue-600 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-blue-500 transition-colors">Verif Manual</button>` : `<button onclick="deleteTr('${tr.id}')" class="flex-1 bg-red-500/10 text-red-500 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-red-500/20 transition-colors">Hapus</button>`}
                        </div>
                    `;
                    container.appendChild(card);
                });
                lucide.createIcons();
            }, (e) => {
                console.error("Gagal memuat transaksi:", e);
                document.getElementById('transaction-list').innerHTML = '<div class="col-span-full text-center text-red-500 text-xs">Gagal memuat data. Periksa aturan keamanan Firestore Anda.</div>';
            });
        }

        // AKSI TRANSAKSI
        window.manualSuccess = async (id) => { 
            if(confirm('Verifikasi manual pembayaran ini? Status di pelanggan akan berubah jadi Lunas.')) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'transactions', id), {
                    status:'success', 
                    verifiedAt:serverTimestamp()
                }); 
            }
        };
        window.deleteTr = async (id) => { 
            if(confirm('Hapus data transaksi ini permanen?')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'transactions', id)); 
            }
        };

        // MEMUAT & MENYIMPAN PENGATURAN
        window.saveSettings = async () => {
            localSettings.monitorEmail = document.getElementById('monitor-email').value;
            localSettings.emailSubject = document.getElementById('email-subject').value;
            localSettings.qrisString = document.getElementById('qris-string').value;
            
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings'), localSettings);
                alert("Data berhasil disimpan!");
            } catch (e) {
                alert("Gagal menyimpan. Pastikan internet stabil.");
            }
        };

        async function loadSettings() {
            try {
                const s = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings'));
                if(s.exists()){ 
                    localSettings = s.data(); 
                    document.getElementById('monitor-email').value = localSettings.monitorEmail || "";
                    document.getElementById('email-subject').value = localSettings.emailSubject || "Terima Dana";
                    document.getElementById('qris-string').value = localSettings.qrisString || "";
                    renderRegions(); 
                }
            } catch (e) {
                console.log("Pengaturan belum ada atau gagal dimuat.");
            }
        }

        // UI TAB & REGIONS
        window.switchTab = (t) => {
            ['dashboard', 'email-config', 'settings'].forEach(tab => {
                document.getElementById(`view-${tab}`).classList.toggle('hidden', tab !== t);
                const btn = document.getElementById(`nav-${tab}`);
                if(tab === t) btn.className = "sidebar-active w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl font-bold transition-all";
                else btn.className = "text-slate-400 w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl font-bold transition-all hover:bg-slate-900";
            });
            document.getElementById('view-title').innerText = t === 'dashboard' ? 'Dashboard' : t === 'email-config' ? 'Setup Bot Email' : 'Pengaturan Wilayah';
            if(window.innerWidth < 768) document.getElementById('sidebar').classList.add('hidden');
        };

        window.renderRegions = () => {
            const container = document.getElementById('regions-container');
            container.innerHTML = '';
            localSettings.regions.forEach((reg, ri) => {
                const div = document.createElement('div');
                div.className = "glass p-6 rounded-[2rem] space-y-4 border border-slate-700";
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <input type="text" value="${reg.name}" onchange="localSettings.regions[${ri}].name=this.value" class="bg-transparent border-none font-black text-xl text-white outline-none w-full">
                        <button onclick="copyRegionLink('${reg.name}')" class="text-blue-500 p-2 hover:bg-slate-800 rounded-lg" title="Salin Link Wilayah"><i data-lucide="link"></i></button>
                        <button onclick="localSettings.regions.splice(${ri},1);renderRegions()" class="text-red-500 p-2 hover:bg-slate-800 rounded-lg" title="Hapus Wilayah"><i data-lucide="trash-2"></i></button>
                    </div>
                    <div id="pkgs-${ri}" class="space-y-2"></div>
                    <button onclick="localSettings.regions[${ri}].packages.push({mbps:10,price:150000});renderRegions()" class="text-[10px] font-black text-blue-500 uppercase">+ Tambah Paket</button>
                `;
                container.appendChild(div);
                
                reg.packages.forEach((pk, pi) => {
                    const d = document.createElement('div'); 
                    d.className = "bg-slate-950/50 p-3 rounded-2xl flex justify-between items-center gap-2";
                    d.innerHTML = `
                        <input type="number" value="${pk.mbps}" onchange="localSettings.regions[${ri}].packages[${pi}].mbps=parseInt(this.value)" class="bg-transparent text-white font-bold w-16 text-sm outline-none border-b border-slate-700 focus:border-blue-500"> 
                        <span class="text-slate-600 text-xs">Mbps</span> 
                        <div class="flex-1 text-right text-blue-500 font-black text-sm">Rp 
                            <input type="number" value="${pk.price}" onchange="localSettings.regions[${ri}].packages[${pi}].price=parseInt(this.value)" class="bg-transparent text-blue-500 font-black w-24 outline-none border-b border-slate-700 focus:border-blue-500">
                        </div>
                        <button onclick="localSettings.regions[${ri}].packages.splice(${pi},1);renderRegions()" class="text-red-500/50 p-2 hover:text-red-500"><i data-lucide="x" class="w-4 h-4"></i></button>
                    `;
                    document.getElementById(`pkgs-${ri}`).appendChild(d);
                });
            });
            lucide.createIcons();
        }

        window.addRegion = () => {
            localSettings.regions.push({name: "Wilayah Baru", packages: []});
            renderRegions();
        };

        window.copyRegionLink = (n) => { 
            const url = window.location.origin + window.location.pathname.replace('admin.html', 'index.html') + '?w=' + encodeURIComponent(n); 
            
            // Fallback copy mechanism
            const el = document.createElement('textarea');
            el.value = url;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            alert("Berhasil! Link Pembayaran Khusus Wilayah " + n + " disalin.\n\n" + url); 
        };

        // SCAN QRIS IMAGE
        window.handleMasterQris = (i) => { 
            if(!i.files[0]) return; 
            const r = new FileReader(); 
            r.onload = (e) => { 
                const img = new Image(); 
                img.onload = () => { 
                    const c = document.createElement("canvas"); 
                    c.width = img.width; 
                    c.height = img.height; 
                    const ctx = c.getContext("2d"); 
                    ctx.drawImage(img, 0, 0, img.width, img.height); 
                    const cd = jsQR(ctx.getImageData(0,0,c.width,c.height).data, c.width, c.height); 
                    if (cd) { 
                        document.getElementById('qris-string').value = cd.data; 
                        localSettings.qrisString = cd.data; 
                        alert("Berhasil mengekstrak kode QRIS!");
                    } else {
                        alert("Gagal membaca QRIS. Pastikan gambar jelas dan tidak terpotong.");
                    }
                }; 
                img.src = e.target.result; 
            }; 
            r.readAsDataURL(i.files[0]); 
        };

        window.viewImage = (s) => { 
            document.getElementById('full-image').src = s; 
            document.getElementById('modal-image').classList.remove('hidden'); 
        };

        lucide.createIcons();
    </script>
</body>
</html>
